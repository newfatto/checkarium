services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"

  web:
    build: .
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && su appuser -s /bin/sh -c 'gunicorn config.wsgi:application --bind 0.0.0.0:8000'"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - static_volume:/app/collected_static
      - media_volume:/app/media
    expose:
      - "8000"

  celery:
    build: .
    restart: unless-stopped
    command: su appuser -s /bin/sh -c "celery -A config worker -l info"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-beat:
    build: .
    restart: unless-stopped
    command: su appuser -s /bin/sh -c "celery -A config beat -l info"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:latest
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/collected_static:ro
      - media_volume:/app/media:ro

volumes:
  postgres_data:
  static_volume:
  media_volume: